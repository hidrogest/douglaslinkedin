<body class="bg-gradient-to-br from-[#f0f4f8] via-[#e8f0fe] to-[#f0f4f8] min-h-screen text-slate-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Ícones (SVGs) ---

    const MapPin = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Mail = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
    const Phone = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const ChevronRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const Rocket = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 3.82-13.04L14 3l1.86 1.86c.65.65 1.48 1.15 2.41 1.45L21 7l-2.04 1.18a22 22 0 0 1-13.04 3.82z"/><circle cx="14.5" cy="9.5" r="1.5"/></svg>;
    const CopyIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const XCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const ArrowLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
    const Camera = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const Linkedin = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>;

    // --- Componentes Auxiliares ---
    const CopyInlineButton = ({ text, label = "Copiar", onCopy }) => (
      <button
        onClick={(e) => { e.stopPropagation(); onCopy(text); }}
        className="flex items-center justify-center gap-1.5 px-3 py-1.5 bg-gradient-to-r from-[#0a66c2] to-[#084e96] hover:from-[#084e96] hover:to-[#063970] text-white text-[11px] uppercase tracking-wider font-bold rounded-full transition-all shadow-[0_4px_10px_rgba(10,102,194,0.3)] hover:shadow-[0_6px_15px_rgba(10,102,194,0.4)] hover:-translate-y-0.5 active:scale-95 shrink-0"
        title={`Copiar ${label.toLowerCase()}`}
      >
        <CopyIcon size={14} /> {label}
      </button>
    );

    function App() {
      const [showCopyModal, setShowCopyModal] = useState(false);
      const [toastMsg, setToastMsg] = useState("");

      // --- DADOS DO DOUGLAS ---
      const bgPlaceholder = "https://placehold.co/1200x360/0B3B59/ffffff?text=Capa+Institucional+(Em+Desenvolvimento)";
      const logoHidrogest = "https://drive.google.com/thumbnail?id=1aWt-ZBZIvBdviJ3hoYVExMUoQlFEt15O&sz=w200";
      const logoMarinha = "https://ui-avatars.com/api/?name=Marinha+do+Brasil&size=200&background=0284c7&color=fff"; // Representing the CIR

      const handleCopyText = (text) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          setToastMsg("Copiado com sucesso!");
        } catch (err) {
          setToastMsg("Erro ao copiar.");
        }
        document.body.removeChild(textArea);
        setTimeout(() => setToastMsg(""), 3000);
      };

      const copyTexts = {
        nome: "Douglas Maxiliano Rosa de Oliveira",
        titulo: "Técnico Hidrometrista Júnior & Marinheiro Fluvial | Monitoramento Hidrossedimentológico",
        sobre: "Profissional dedicado às operações práticas de campo com vasta experiência em Hidrometria e Monitoramento Ambiental.\n\nAtuo diretamente na linha de frente da Hidrogest Engenharia como Técnico Hidrometrista Júnior, onde sou responsável por medições críticas de descarga líquida e amostragem de sedimentos. Minha atuação possui forte impacto em projetos de recuperação ambiental, destacando-se meu envolvimento nas estações da bacia do rio Paraopeba (impactadas pelo rompimento da Barragem B1 - Vale).\n\nPossuo também certificação como Marinheiro Fluvial Auxiliar de Convés (CIR) pela Autoridade Marítima Brasileira e treinamento rigoroso em Primeiros Socorros Avançados (PSA) pela Vale, o que garante a execução de coletas fluviais com o mais alto rigor técnico e segurança.",

        licencaCIR: "Certificação oficial pela Diretoria de Portos e Costas, habilitando a atuação operacional e segura em embarcações fluviais durante as coletas hidrossedimentológicas."
      };

      return (
        <div className="min-h-screen font-sans pb-16 selection:bg-blue-200">

              <CheckCircle2 size={20} />
              {toastMsg}
            </div>
          </div>

          <div className="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-white shadow-sm">
            <div className="max-w-5xl mx-auto px-4 py-4">

              {/* BOTÃO LIQUID GLASS GLOW - VOLTAR PRO HUB */}
              <div className="mb-4">
                <a 
                  href="https://hidrogest.github.io/hublinkedin/"
                  className="group relative inline-flex items-center justify-center self-start"
                  title="Voltar para o Hub de Auditorias"
                >
                  <span className="absolute -inset-1 bg-gradient-to-r from-[#0a66c2] via-[#34d399] to-[#0ea5e9] rounded-full blur-md opacity-40 group-hover:opacity-80 animate-pulse transition duration-500"></span>
                  <span className="relative flex items-center gap-2 px-5 py-2 bg-white/20 backdrop-blur-lg border border-white/60 rounded-full shadow-[0_4px_15px_rgba(0,0,0,0.05)] transition-all duration-300 group-hover:bg-white/40 group-hover:shadow-[0_8px_25px_rgba(0,0,0,0.1)] overflow-hidden">
                    <span className="absolute inset-x-0 top-0 h-[45%] bg-gradient-to-b from-white/70 to-transparent rounded-t-full pointer-events-none"></span>
                    <ArrowLeft size={16} className="text-[#0B3B59] group-hover:-translate-x-1 transition-transform duration-300 relative z-10" />
                    <span className="text-[13px] uppercase tracking-wider font-bold text-[#0B3B59] relative z-10">
                      Voltar pro Hub
                    </span>
                  </span>
                </a>
              </div>

              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                
                <div className="flex items-center gap-3">
                  <div className="bg-gradient-to-br from-[#0B3B59] to-[#062438] text-white p-2.5 rounded-xl shadow-lg shadow-[#0B3B59]/20">
                    <Linkedin size={24} />
                  </div>
                  <div>
                    <h1 className="font-bold text-xl text-gray-900 leading-tight">Projeto: Criação de Perfil</h1>
                    <p className="text-sm text-gray-500 font-medium">Colaborador: Douglas Maxiliano</p>
                  </div>
                </div>

              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto mt-8 px-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div className="lg:col-span-1 space-y-4">
              <div className="bg-gradient-to-br from-[#0a66c2] to-[#063970] text-white rounded-2xl shadow-xl border border-blue-400 p-5 sticky top-28 overflow-hidden relative">
                
                {/* Elementos decorativos no card */}
                <div className="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-5 rounded-full blur-xl"></div>
                <div className="absolute bottom-0 left-0 -mb-4 -ml-4 w-20 h-20 bg-blue-300 opacity-10 rounded-full blur-lg"></div>

                <h3 className="font-bold text-xl mb-3 flex items-center gap-2 relative z-10">
                  <Rocket size={22} className="text-blue-300" />
                  Por que estar no LinkedIn?

                <p className="text-sm text-blue-100 leading-relaxed mb-4 relative z-10">
                  Douglas, o trabalho que você faz em campo é <strong>vital</strong>. Estar no LinkedIn não é apenas para "quem trabalha em escritório", é para mostrar o valor técnico do seu esforço.
                </p>

                <ul className="space-y-3 mb-6 relative z-10">
                  <li className="flex items-start gap-2">
                    <CheckCircle2 size={16} className="text-blue-300 shrink-0 mt-0.5" />

            <div className="lg:col-span-3 space-y-4 relative">
              
              <div className="absolute -right-2 -top-6 text-sm font-bold text-gray-400 flex items-center gap-1 uppercase tracking-wider">

              </div>

              {/* CARD PRINCIPAL - PROJEÇÃO */}
              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white overflow-hidden relative transition-all duration-500 hover:shadow-lg">
                
                {/* Capa */}

                  <img 
                    src={bgPlaceholder} 
                    alt="Capa Pendente" 
                    className="absolute inset-0 w-full h-full object-cover opacity-80"
                  />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                </div>

                <div className="px-4 sm:px-6 pb-6 relative">
                  
                  {/* Foto de Perfil Placeholder */}
                  <div className="relative -mt-16 sm:-mt-20 md:-mt-24 mb-3 z-20 inline-block">
                    <div className="w-28 h-28 sm:w-36 sm:h-36 md:w-40 md:h-40 rounded-full border-4 border-white bg-slate-100 shadow-lg relative flex flex-col items-center justify-center overflow-hidden">
                      <div className="absolute inset-0 shimmer"></div>
                      <Camera size={32} className="text-slate-400 relative z-10 mb-1" />
                      <span className="text-[10px] sm:text-xs font-bold text-slate-400 text-center leading-tight relative z-10 px-2">Aguardando<br/>Foto de Campo</span>
                      <div className="absolute inset-0 ring-1 ring-black/10 rounded-full pointer-events-none z-20"></div>
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row justify-between items-start gap-4">
                    <div className="max-w-xl w-full">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-1.5">
                        <h1 className="text-xl sm:text-2xl font-bold text-gray-900 leading-tight">
                          Douglas Maxiliano Rosa de Oliveira
                        </h1>
                        <CopyInlineButton text={copyTexts.nome} label="Copiar Nome" onCopy={handleCopyText} />
                      </div>

                      <div className="text-[16px] sm:text-[17px] text-gray-700 leading-snug mt-2">
                        <span className="block font-medium text-gray-800">
                          Técnico Hidrometrista Júnior & Marinheiro Fluvial | Monitoramento Hidrossedimentológico
                        </span>
                      </div>

                      <div className="text-gray-500 text-sm mt-3 flex items-center gap-1.5 font-medium">
                        <MapPin size={16} className="text-gray-400" /> Igarapé, Minas Gerais, Brasil
                      </div>
                      
                      <div className="mt-3 flex flex-wrap gap-3 sm:gap-4 text-sm font-semibold text-[#0a66c2] inline-flex">
                        <span className="flex items-center gap-1.5 hover:underline cursor-pointer"><Mail size={16} /> hidrogest@hidrogestengenharia.com.br</span>
                        <span className="flex items-center gap-1.5 hover:underline cursor-pointer"><Phone size={16} /> (31) 99906-7568</span>
                      </div>
                    </div>

                    <div className="hidden md:flex flex-col gap-3 items-start sm:items-end w-56 shrink-0 mt-2">
                      <div className="flex items-center gap-3 w-full justify-end group cursor-pointer">
                        <span className="text-[15px] font-semibold text-gray-900 text-right leading-tight group-hover:text-[#0a66c2] transition-colors">HIDROGEST ENGENHARIA</span>
                        <img src={logoHidrogest} alt="Hidrogest" className="w-10 h-10 shrink-0 object-contain bg-white rounded-lg shadow-sm border border-gray-100 group-hover:scale-105 transition-transform" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* CARD SOBRE */}
              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white p-4 sm:p-6 hover:shadow-lg transition-all duration-300">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-3">
                  <h2 className="text-xl font-bold text-gray-900">Sobre</h2>
                  <CopyInlineButton text={copyTexts.sobre} label="Copiar Resumo" onCopy={handleCopyText} />
                </div>
                
                <div className="bg-blue-50/50 border border-blue-100 rounded-xl p-4 mb-4">
                  <p className="text-sm text-blue-800 flex items-start gap-2">
                    <Info size={18} className="text-blue-500 shrink-0 mt-0.5" />
                    <span>Criei este texto para valorizar o fato de você estar diretamente envolvido na recuperação de Brumadinho e destacar sua certificação da Marinha.</span>
                  </p>
                </div>

                <div className="text-[15px] text-gray-800 space-y-3 whitespace-pre-wrap leading-relaxed">
                  {copyTexts.sobre}
                </div>
              </div>

              {/* CARD EXPERIÊNCIA */}
              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white p-4 sm:p-6 hover:shadow-lg transition-all duration-300">
                <h2 className="text-xl font-bold text-gray-900 mb-8">Experiência</h2>

                {/* HIDROGEST */}
                <div className="flex gap-3 sm:gap-4 group/exp">
                  <img src={logoHidrogest} alt="Hidrogest" className="shrink-0 w-10 h-10 sm:w-12 sm:h-12 object-contain bg-white shadow-md rounded-lg border border-gray-100 mt-1 z-10 relative group-hover/exp:scale-105 transition-transform" />
                  <div className="flex-1 pb-8 relative">
                    <div className="absolute top-12 bottom-0 left-[-26px] sm:left-[-38px] w-0.5 bg-gradient-to-b from-gray-200 to-gray-100"></div>
                    
                    <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2">
                      <div>
                        <h3 className="text-[16px] sm:text-[17px] font-bold text-gray-900">
                          Técnico Hidrometrista Júnior
                        </h3>
                        <div className="text-[14px] sm:text-[15px] text-gray-900 font-medium mt-0.5">HIDROGEST ENGENHARIA E CONSULTORIA</div>
                      </div>
                      <CopyInlineButton text={copyTexts.experienciaHidrogest} onCopy={handleCopyText} />
                    </div>
                    
                    <div className="text-[14px] sm:text-[15px] text-gray-500 mt-1">
                      set de 2023 - o momento
                    </div>
                    <div className="text-[14px] sm:text-[15px] text-gray-500">Igarapé, Minas Gerais, Brasil</div>
                    
                    <div className="mt-4 text-[14px] sm:text-[15px] text-gray-800 leading-relaxed space-y-3">
                      <div className="whitespace-pre-wrap">{copyTexts.experienciaHidrogest}</div>
                    </div>
                  </div>
                </div>

              </div>

              {/* LICENÇAS E CERTIFICADOS */}
              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white p-4 sm:p-6 hover:shadow-lg transition-all duration-300">
                <h2 className="text-xl font-bold text-gray-900 mb-8">Licenças e certificados</h2>

                {/* CIR MARINHA */}
                <div className="flex gap-3 sm:gap-4 group/exp">
                  <img src={logoMarinha} alt="Marinha" className="shrink-0 w-10 h-10 sm:w-12 sm:h-12 object-contain bg-white shadow-md rounded-lg border border-gray-100 mt-1 z-10 relative group-hover/exp:scale-105 transition-transform" />
                  <div className="flex-1 pb-2 relative">
                    
                    <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2">
                      <div>
                        <h3 className="text-[16px] sm:text-[17px] font-bold text-gray-900">
                          Marinheiro Fluvial Auxiliar de Convés (CIR)
                        </h3>
                        <div className="text-[14px] sm:text-[15px] text-gray-900 font-medium mt-0.5">Autoridade Marítima Brasileira (Diretoria de Portos e Costas)</div>
                      </div>
                      <CopyInlineButton text={copyTexts.licencaCIR} label="Copiar CIR" onCopy={handleCopyText} />
                    </div>

                    <div className="text-[14px] sm:text-[15px] text-gray-500 mt-1">
                      Emitido em ago de 2025 · Expira em ago de 2030
                    </div>
                    
                    <div className="mt-3 text-[14px] sm:text-[15px] text-gray-800 leading-relaxed">
                      <p>{copyTexts.licencaCIR}</p>
                    </div>
                  </div>
                </div>
              </div>

              {/* COMPETÊNCIAS */}
              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white p-4 sm:p-6 hover:shadow-lg transition-all duration-300">
                <h2 className="text-xl font-bold text-gray-900 mb-6">Competências Sugeridas</h2>
                <div className="flex flex-wrap gap-2.5">
                  {["Operações de Campo", "Hidrometria", "Sedimentometria", "Telemetria", "Condução de Embarcações", "Recuperação Ambiental", "Segurança do Trabalho (PSA)"].map(comp => (
                    <span key={comp} className="bg-gradient-to-br from-blue-50 to-indigo-50/50 text-[#0B3B59] px-4 py-1.5 rounded-full text-sm font-bold border border-blue-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all cursor-default">{comp}</span>
                  ))}
                </div>
              </div>
              
            </div>
          </div>

          {/* MODAL COPIAR TUDO */}
          {showCopyModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto flex flex-col border border-white">
                
                <div className="sticky top-0 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex items-center justify-between z-10">
                  <h2 className="text-xl font-bold text-[#0B3B59] flex items-center gap-2">
                    <CopyIcon size={20} className="text-[#0a66c2]" /> Textos Sugeridos (Douglas)
                  </h2>
                  <button onClick={() => setShowCopyModal(false)} className="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-full transition-all">
                    <XCircle size={24} />
                  </button>
                </div>

                <div className="p-6 space-y-6">
                  <p className="text-sm text-gray-600 font-medium">Copie os blocos de texto abaixo ao criar o seu LinkedIn:</p>
                  
                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Nome Completo</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm font-medium">{copyTexts.nome}</p>
                    <button onClick={() => handleCopyText(copyTexts.nome)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Copiar Nome
                    </button>
                  </div>

                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Título Profissional</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm font-medium">{copyTexts.titulo}</p>
                    <button onClick={() => handleCopyText(copyTexts.titulo)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Copiar Título
                    </button>
                  </div>

                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Resumo (Sobre)</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm whitespace-pre-wrap">{copyTexts.sobre}</p>
                    <button onClick={() => handleCopyText(copyTexts.sobre)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Copiar Sobre
                    </button>
                  </div>

                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Experiência (Hidrogest)</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm whitespace-pre-wrap">{copyTexts.experienciaHidrogest}</p>
                    <button onClick={() => handleCopyText(copyTexts.experienciaHidrogest)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Copiar Experiência Hidrogest
                    </button>
                  </div>

                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Licença (CIR Marinha)</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm whitespace-pre-wrap">{copyTexts.licencaCIR}</p>
                    <button onClick={() => handleCopyText(copyTexts.licencaCIR)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Copiar CIR
                    </button>
                  </div>

                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
