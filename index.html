        textArea.select();

                  <div className="flex flex-col sm:flex-row justify-between items-start gap-4">
                    <div className="max-w-xl w-full">

              </div>

              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white p-4 sm:p-6 hover:shadow-lg transition-all duration-300">
                <h2 className="text-xl font-bold text-gray-900 mb-8">Licenças e certificados</h2>

                <div className="flex gap-3 sm:gap-4 group/exp">
                  <img src={logoMarinha} alt="Marinha" className="shrink-0 w-10 h-10 sm:w-12 sm:h-12 object-contain bg-white shadow-md rounded-lg border border-gray-100 mt-1 z-10 relative group-hover/exp:scale-105 transition-transform" />
                  <div className="flex-1 pb-2 relative">
                    
                    <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2">
                      <div>
                        <h3 className="text-[16px] sm:text-[17px] font-bold text-gray-900">
                          Marinheiro Fluvial Auxiliar de Convés (CIR)
                        </h3>
                        <div className="text-[14px] sm:text-[15px] text-gray-900 font-medium mt-0.5">Marinha do Brasil (Diretoria de Portos e Costas)</div>
                      </div>
                      <CopyInlineButton text={copyTexts.licencaCIR} label="Copiar licença" onCopy={handleCopyText} />
                    </div>

                    <div className="text-[14px] sm:text-[15px] text-gray-500 mt-1">
                      Emitido em agosto de 2025 · Válido até agosto de 2030
                    </div>
                    
                    <div className="mt-3 text-[14px] sm:text-[15px] text-gray-800 leading-relaxed">
                      <p>{copyTexts.licencaCIR}</p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white p-4 sm:p-6 hover:shadow-lg transition-all duration-300">
                <h2 className="text-xl font-bold text-gray-900 mb-6">Competências que podemos adicionar</h2>
                <p className="text-sm text-gray-500 mb-4">No LinkedIn, a gente pode colocar essas "etiquetas" que resumem bem o que você sabe fazer:</p>
                <div className="flex flex-wrap gap-2.5">
                  {["Operações de Campo", "Trabalho em Equipe", "Hidrometria", "Sedimentometria", "Telemetria", "Condução de Barcos", "Recuperação do Meio Ambiente", "Segurança do Trabalho"].map(comp => (
                    <span key={comp} className="bg-gradient-to-br from-blue-50 to-indigo-50/50 text-[#0B3B59] px-4 py-1.5 rounded-full text-sm font-medium border border-blue-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all cursor-default">{comp}</span>
                  ))}
                </div>
              </div>
              
            </div>
          </div>

          {}
          {showCopyModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto flex flex-col border border-white">
                
                <div className="sticky top-0 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex items-center justify-between z-10">
                  <h2 className="text-xl font-bold text-[#0B3B59] flex items-center gap-2">
                    <CopyIcon size={20} className="text-[#0a66c2]" /> Textos Prontos para Uso
                  </h2>
                  <button onClick={() => setShowCopyModal(false)} className="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-full transition-all">
                    <XCircle size={24} />
                  </button>
                </div>

                <div className="p-6 space-y-6">
                  <p className="text-sm text-gray-600">Oi Douglas! Quando você for fazer o seu cadastro no LinkedIn ou preencher as informações, é só clicar nos botões azuis abaixo. Eles já copiam o texto direitinho para você só colar lá. É bem simples!</p>
                  
                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Seu Nome Completo</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm font-medium">{copyTexts.nome}</p>
                    <button onClick={() => handleCopyText(copyTexts.nome)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Clicar para copiar o Nome
                    </button>
                  </div>

                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Seu Título Profissional</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm font-medium">{copyTexts.titulo}</p>
                    <button onClick={() => handleCopyText(copyTexts.titulo)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Clicar para copiar o Título
                    </button>
                  </div>

                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Resumo (Quem é você)</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm whitespace-pre-wrap">{copyTexts.sobre}</p>
                    <button onClick={() => handleCopyText(copyTexts.sobre)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Clicar para copiar o Resumo
                    </button>
                  </div>

                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Seu Trabalho na Hidrogest</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm whitespace-pre-wrap">{copyTexts.experienciaHidrogest}</p>
                    <button onClick={() => handleCopyText(copyTexts.experienciaHidrogest)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Clicar para copiar a Experiência
                    </button>
                  </div>

                  <div className="border border-gray-100 rounded-xl p-4 bg-gray-50/50 relative group">
                    <h3 className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Sua Licença da Marinha</h3>
                    <p className="text-gray-800 bg-white p-3 rounded-lg border border-gray-200 shadow-sm whitespace-pre-wrap">{copyTexts.licencaCIR}</p>
                    <button onClick={() => handleCopyText(copyTexts.licencaCIR)} className="mt-3 text-sm font-bold text-[#0a66c2] hover:text-[#084e96] flex items-center gap-1 transition-all">
                      <CopyIcon size={16} /> Clicar para copiar a Licença
                    </button>
                  </div>

                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
